<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Real - Invitación Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Mrs+Saint+Delafield&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --oro: #aa9a6e;
            --carbon: #1a1a1a;
            --crema: #fdfbf7;
            --gris-suave: #f4f4f4;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--crema);
            color: var(--carbon);
            text-align: center;
        }

        /* --- SECCIÓN 1: HOME BANNER --- */
        .home-banner {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=2069&auto=format&fit=crop') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .home-banner h1 {
            font-family: 'Mrs Saint Delafield', cursive;
            font-size: clamp(70px, 15vw, 120px);
            margin: 0;
        }

        .home-banner p {
            font-family: 'Gilda Display', serif;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- SECCIÓN 2: FRASE Y PADRES --- */
        .alegria {
            padding: 80px 20px;
            background: white;
        }

        .frase {
            font-family: 'Gilda Display', serif;
            font-size: 1.4rem;
            font-style: italic;
            max-width: 600px;
            margin: 0 auto 50px;
        }

        .padres-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .padres-col h3 {
            color: var(--oro);
            font-family: 'Gilda Display', serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* --- SECCIÓN 3: CUANDO Y DONDE (CONTADOR) --- */
        .cuando-donde {
            background: var(--gris-suave);
            padding: 80px 20px;
        }

        .contador {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .tiempo-item {
            background: white;
            padding: 15px;
            min-width: 70px;
            border-radius: 50%;
            border: 1px solid var(--oro);
        }

        .tiempo-item span { font-size: 1.5rem; font-weight: bold; display: block; }
        .tiempo-item label { font-size: 0.6rem; text-transform: uppercase; }

        /* --- SECCIÓN 4: TIMELINE (ITINERARIO) --- */
        .timeline {
            padding: 80px 20px;
        }

        .timeline-item {
            border-left: 2px solid var(--oro);
            margin: 0 auto 30px;
            max-width: 400px;
            padding-left: 30px;
            position: relative;
            text-align: left;
        }

        .timeline-item::before {
            content: "";
            width: 12px; height: 12px;
            background: var(--carbon);
            position: absolute;
            left: -7px; top: 5px;
            border-radius: 50%;
        }

        .timeline-item h3 { font-family: 'Gilda Display', serif; color: var(--oro); margin: 0; }

        /* --- SECCIÓN 5: DRESSCODE Y REGALOS --- */
        .info-extra {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--carbon);
            color: white;
        }

        .info-col { padding: 60px 20px; border: 0.5px solid #333; }
        .info-col h2 { font-family: 'Gilda Display', serif; color: var(--oro); }

        /* --- SECCIÓN 6: ASISTENCIA (EL BOTÓN) --- */
        .asistencia {
            padding: 100px 20px;
            background: var(--crema);
        }

        .btn-confirmar {
            background: var(--oro);
            color: white;
            padding: 20px 50px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 5px;
            margin-top: 30px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .padres-grid, .info-extra { grid-template-columns: 1fr; }
            .home-banner h1 { font-size: 60px; }
        }
    </style>
</head>
<body>

    <section class="home-banner">
        <p>Nuestra Boda</p>
        <h1>Juan & María</h1>
        <p>24 . OCTUBRE . 2026</p>
    </section>

    <section class="alegria">
        <div class="frase">"Con la bendición de Dios y nuestros padres, unimos nuestras vidas."</div>
        
        <div class="padres-grid">
            <div class="padres-col">
                <h3>PADRES DE LA NOVIA</h3>
                <p>Sr. Pedro María<br>Sra. Rosa Pérez</p>
            </div>
            <div class="padres-col">
                <h3>PADRES DEL NOVIO</h3>
                <p>Sr. Juan Carlos<br>Sra. Elena Solís</p>
            </div>
        </div>
    </section>

    <section class="cuando-donde">
        <h2 style="font-family: 'Gilda Display';">FALTAN SOLO...</h2>
        <div class="contador">
            <div class="tiempo-item"><span id="dias">00</span><label>Días</label></div>
