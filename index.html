<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Nuestra Boda: J & M</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --primario: #1a2a6c; 
            --acento: #b2bec3; 
            --rosa-like: #ff4757;
            --gris-like: #ced4da;
            --texto: #2d3436;
            --blanco-puro: #ffffff;
            --url-fondo-cabecera: url('https://www.dropbox.com/scl/fi/uoyjxmn2as5psbktmj6ex/FONDO-DE-ALBUN-DE-BODA-2.jpg?rlkey=o2gj2u8bzh6acfm24furscmp0&raw=1');
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f7f6;
            color: var(--texto);
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* BARRA DE ESTADÍSTICAS SUPERIOR */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: white;
            padding: 15px 10px;
            margin: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .stat-item { flex: 1; }
        .stat-num { display: block; font-weight: bold; font-size: 1.2rem; color: var(--primario); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        .header-album {
            background: var(--url-fondo-cabecera);
            background-size: cover;
            background-position: center;
            padding: 50px 20px;
            border-bottom: 5px solid var(--acento);
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .foto-portada {
            width: 120px; height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 4px solid var(--blanco-puro);
            overflow: hidden;
        }
        .foto-portada img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Great Vibes', cursive; font-size: 3rem; margin: 0; }

        .chat-container {
            background: white; margin: -20px 10px 20px;
            padding: 25px 10px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .input-box {
            background: #f8f9fa; padding: 15px; border-radius: 20px;
            max-width: 350px; margin: 0 auto; border: 1px solid #eee;
        }
        .input-box input, .input-box textarea {
            width: 90%; border: none; background: transparent; 
            font-family: 'Montserrat'; outline: none; margin-bottom: 10px;
        }

        .btn-enviar {
            background: var(--primario); color: white; border: none;
            padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer;
        }

        #muro-mensajes {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto;
        }
        .sticker {
            width: 120px; padding: 10px; font-size: 0.75rem; 
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1); border-radius: 5px;
        }

        /* GALERÍA EN 2 COLUMNAS */
        .gallery-grid {
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* AQUÍ LAS 2 COLUMNAS */
            gap: 12px; padding: 12px; margin-bottom: 100px;
        }
        .photo-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); padding-bottom: 10px;
        }
        .photo-img-container { aspect-ratio: 1/1; overflow: hidden; position: relative; }
        .photo-img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* LIKES Y NOMBRE DEBAJO DE LA FOTO */
        .photo-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 8px 5px;
        }
        .uploader-name { font-size: 0.7rem; font-weight: bold; color: #555; text-align: left; }
        .like-container { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .heart-icon { font-size: 1.2rem; color: var(--gris-like); transition: 0.3s; }
        .heart-icon.active { color: var(--rosa-like); }
        .like-count { font-size: 0.8rem; font-weight: bold; }

        .float-btn { position: fixed; bottom: 20px; width: 100%; z-index: 1000; }
        .btn-upload {
            background: var(--primario); color: white; padding: 15px 30px;
            border-radius: 50px; border: 2px solid white; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header-album">
        <div class="foto-portada">
            <img src="https://images.pexels.com/photos/2253870/pexels-photo-2253870.jpeg?auto=compress&cs=tinysrgb&w=400">
        </div>
        <h1>Juan & María</h1>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-num" id="stat-fotos">0</span>
            <span class="stat-label">Fotos</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="stat-likes">0</span>
            <span class="stat-label">Likes</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="stat-mensajes">0</span>
            <span class="stat-label">Mensajes</span>
        </div>
    </div>

    <div class="chat-container">
        <div class="input-box">
            <input type="text" id="n" placeholder="Tu nombre...">
            <textarea id="m" placeholder="Escribe un deseo..."></textarea>
            <button class="btn-enviar" onclick="enviar()">ENVIAR MENSAJE</button>
        </div>
        <div id="muro-mensajes"></div>
    </div>

    <h2 style="font-family: 'Great Vibes'; color: var(--primario);">Momentos</h2>
    <div class="gallery-grid" id="galeria"></div>

    <div class="float-btn">
        <button id="upload_widget" class="btn-upload">📸 SUBIR FOTO</button>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON LA QUE TE DIO GOOGLE AL IMPLEMENTAR
        const SCRIPT_URL = "TU_NUEVA_URL_DE_APPS_SCRIPT"; 
        
        const cloudName = "dkoaxjahe";
        const eventTag = "boda_juan_maria_2026";
        let likesData = {};

        async function cargarTodo() {
            try {
                // 1. Cargar Estadísticas y Likes desde Google
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                document.getElementById('stat-mensajes').innerText = data.totalMensajes;
                document.getElementById('stat-likes').innerText = data.totalLikes;
                
                // Guardamos los likes de cada foto en un objeto para usarlos luego
                data.detalleLikes.forEach(fila => {
                    likesData[fila[0]] = fila[1];
                });

                // 2. Cargar Fotos desde Cloudinary
                const resFotos = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${eventTag}.json?v=${Date.now()}`);
                const dataFotos = await resFotos.json();
                
                document.getElementById('stat-fotos').innerText = dataFotos.resources.length;
                
                const gal = document.getElementById('galeria');
                gal.innerHTML = "";
                dataFotos.resources.forEach(img => {
                    const id = img.public_id;
                    const numLikes = likesData[id] || 0;
                    const uploader = img.context?.custom?.uploader || "Invitado";
                    const urlThumb = `https://res.cloudinary.com/${cloudName}/image/upload/w_600,c_fill/${id}.${img.format}`;
                    
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `
                        <div class="photo-img-container">
                            <img src="${urlThumb}">
                        </div>
                        <div class="photo-footer">
                            <div class="uploader-name">De: ${uploader}</div>
                            <div class="like-container" onclick="darLike('${id}', this)">
                                <span class="heart-icon">❤</span>
                                <span class="like-count">${numLikes}</span>
                            </div>
                        </div>
                    `;
                    gal.appendChild(card);
                });

                // 3. Cargar Chat (esto lo ponemos aparte para no mezclar)
                cargarChat();
            } catch (e) { console.log("Error cargando:", e); }
        }

        async function darLike(idFoto, elemento) {
            const corazon = elemento.querySelector('.heart-icon');
            const contador = elemento.querySelector('.like-count');
            
            // Efecto visual inmediato
            corazon.classList.add('active');
            contador.innerText = parseInt(contador.innerText) + 1;
            
            // Enviar al Excel
            fetch(`${SCRIPT_URL}?accion=darLike&idFoto=${idFoto}`, { method: 'POST', mode: 'no-cors' });
            
            // Actualizar contador general arriba
            const totalLikesArriba = document.getElementById('stat-likes');
            totalLikesArriba.innerText = parseInt(totalLikesArriba.innerText) + 1;
        }

        async function enviar() {
            const nom = document.getElementById('n').value;
            const msg = document.getElementById('m').value;
            if(!nom || !msg) return alert("Faltan datos");
            
            const data = new URLSearchParams();
            data.append('Nombre', nom);
            data.append('Mensaje', msg);
            data.append('Color', '#ffffff');

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: data });
            document.getElementById('m').value = "";
            setTimeout(cargarTodo, 1500);
        }

        async function cargarChat() {
            // Reutilizamos la misma lógica de antes para los stickers
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                // Aquí necesitaríamos que el Apps Script devuelva los mensajes también.
                // Por ahora, para que no falle, lo dejamos cargando las estadísticas.
            } catch (e) {}
        }

        window.onload = cargarTodo;

        // Configuración de subida (Cloudinary)
        const widget = cloudinary.createUploadWidget({
            cloudName: cloudName, uploadPreset: "ALBUN TEST", tags: [eventTag],
            prepareUploadParams: (cb, params) => {
                const n = prompt("¿Quién envía la foto?") || "Invitado";
                cb({ context: `uploader=${n}` });
            }
        }, (err, res) => { if(res.event === "success") setTimeout(cargarTodo, 2000); });
        document.getElementById("upload_widget").onclick = () => widget.open();

    </script>
</body>
</html>
