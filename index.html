<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Mis XV Años ✨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --primario: #d63384; /* Rosa vibrante de XV */
            --secundario: #f8bbd0;
            --acento: #dee2e6; 
            --rosa-like: #ff4757;
            --gris-like: #ced4da;
            --texto: #444;
            --blanco: #ffffff;
            /* Aquí puedes cambiar el fondo por el de los XV años */
            --url-fondo: url('https://www.invitame.com.mx/img/FondoPrincipal.jpg'); 
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: #fff5f8;
            color: var(--texto);
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* BARRA DE ESTADÍSTICAS (Igual a la foto) */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: var(--blanco);
            padding: 15px 5px;
            margin: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.1);
        }
        .stat-item { flex: 1; border-right: 1px solid #eee; }
        .stat-item:last-child { border-right: none; }
        .stat-num { display: block; font-weight: bold; font-size: 1.3rem; color: var(--primario); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: #999; }

        /* CABECERA XV */
        .header-xv {
            background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0.1)), var(--url-fondo);
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            color: var(--blanco);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .foto-xv {
            width: 130px; height: 130px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 4px solid var(--blanco);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .foto-xv img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; margin: 0; color: #fff; }
        .sub-titulo { font-size: 1rem; letter-spacing: 4px; font-weight: 300; }

        /* CONTENEDOR DE MENSAJES */
        .chat-container {
            background: var(--blanco); margin: -25px 15px 20px;
            padding: 25px 15px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .input-box {
            background: #fff0f5; padding: 15px; border-radius: 20px;
            max-width: 400px; margin: 0 auto;
        }
        .input-box input, .input-box textarea {
            width: 90%; border: none; background: transparent; 
            font-family: 'Montserrat'; outline: none; margin-bottom: 10px;
            border-bottom: 1px solid var(--secundario); padding: 5px;
        }
        .btn-enviar {
            background: var(--primario); color: white; border: none;
            padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer;
            box-shadow: 0 4px 10px rgba(214, 51, 132, 0.3);
        }

        #muro-mensajes {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto;
        }
        .sticker {
            width: 130px; background: #fff; padding: 12px; font-size: 0.8rem; 
            box-shadow: 2px 4px 10px rgba(0,0,0,0.05); border-radius: 10px; border-left: 4px solid var(--primario);
        }

        /* GALERÍA 2 COLUMNAS */
        .gallery-title { font-family: 'Great Vibes'; font-size: 2.5rem; color: var(--primario); margin: 30px 0 5px; }
        .gallery-grid {
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; padding: 15px; margin-bottom: 100px;
        }
        .photo-card {
            background: var(--blanco); border-radius: 15px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .photo-img-container { aspect-ratio: 1/1; overflow: hidden; }
        .photo-img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* FOOTER DE FOTO (Likes y Nombre) */
        .photo-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px;
        }
        .uploader-name { font-size: 0.65rem; font-weight: 700; color: #777; text-align: left; max-width: 60%; overflow: hidden; }
        .like-container { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .heart-icon { font-size: 1.3rem; color: var(--gris-like); transition: 0.3s; }
        .heart-icon.active { color: var(--rosa-like); transform: scale(1.2); }
        .like-count { font-size: 0.85rem; font-weight: bold; color: #444; }

        /* BOTÓN SUBIR */
        .float-btn { position: fixed; bottom: 25px; width: 100%; z-index: 1000; }
        .btn-upload {
            background: var(--primario); color: white; padding: 15px 40px;
            border-radius: 50px; border: 3px solid white; font-weight: bold;
            box-shadow: 0 10px 20px rgba(214, 51, 132, 0.4);
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-num" id="stat-fotos">0</span>
            <span class="stat-label">Fotos</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="stat-likes">0</span>
            <span class="stat-label">Likes</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="stat-mensajes">0</span>
            <span class="stat-label">Mensajes</span>
        </div>
    </div>

    <div class="header-xv">
        <div class="foto-xv">
            <img src="https://via.placeholder.com/150"> 
        </div>
        <h1>Mis XV Años</h1>
        <p class="sub-titulo">NATALY</p>
    </div>

    <div class="chat-container">
        <div class="input-box">
            <input type="text" id="n" placeholder="Tu nombre...">
            <textarea id="m" placeholder="Escribe un deseo para la cumpleañera..."></textarea>
            <button class="btn-enviar" onclick="enviar()">PUBLICAR DESEO</button>
        </div>
        <div id="muro-mensajes"></div>
    </div>

    <h2 class="gallery-title">Álbum Digital</h2>
    <p style="font-size: 0.8rem; color: #888;">¡Toca el corazón en tus fotos favoritas!</p>
    
    <div class="gallery-grid" id="galeria"></div>

    <div class="float-btn">
        <button id="upload_widget" class="btn-upload">📸 COMPARTIR FOTOS</button>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON TU NUEVA URL DE GOOGLE SCRIPT
        const SCRIPT_URL = "TU_NUEVA_URL_DE_APPS_SCRIPT"; 
        
        const cloudName = "dkoaxjahe";
        const eventTag = "xv_nataly_2026"; // Cambia el tag si gustas
        let likesData = {};

        async function cargarTodo() {
            try {
                // 1. Cargar Estadísticas (Mensajes y Likes totales)
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                document.getElementById('stat-mensajes').innerText = data.totalMensajes;
                document.getElementById('stat-likes').innerText = data.totalLikes;
                
                // Mapear likes por foto
                likesData = {};
                data.detalleLikes.forEach(fila => { likesData[fila[0]] = fila[1]; });

                // 2. Cargar Fotos de Cloudinary
                const resFotos = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${eventTag}.json?v=${Date.now()}`);
                const dataFotos = await resFotos.json();
                document.getElementById('stat-fotos').innerText = dataFotos.resources.length;
                
                const gal = document.getElementById('galeria');
                gal.innerHTML = "";
                dataFotos.resources.forEach(img => {
                    const id = img.public_id;
                    const numLikes = likesData[id] || 0;
                    const uploader = img.context?.custom?.uploader || "Invitado";
                    const urlThumb = `https://res.cloudinary.com/${cloudName}/image/upload/w_600,c_fill/${id}.${img.format}`;
                    
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `
                        <div class="photo-img-container">
                            <img src="${urlThumb}">
                        </div>
                        <div class="photo-footer">
                            <div class="uploader-name">${uploader}</div>
                            <div class="like-container" onclick="darLike('${id}', this)">
                                <span class="heart-icon ${numLikes > 0 ? 'active' : ''}">❤</span>
                                <span class="like-count">${numLikes}</span>
                            </div>
                        </div>
                    `;
                    gal.appendChild(card);
                });

                // Cargar Chat
                cargarChatSimple(data);
            } catch (e) { console.log(e); }
        }

        async function darLike(idFoto, elemento) {
            const corazon = elemento.querySelector('.heart-icon');
            const contador = elemento.querySelector('.like-count');
            
            if(corazon.classList.contains('active')) return; // Evitar múltiples likes seguidos

            corazon.classList.add('active');
            contador.innerText = parseInt(contador.innerText) + 1;
            
            // Sumar al total de arriba
            const totalLikesArriba = document.getElementById('stat-likes');
            totalLikesArriba.innerText = parseInt(totalLikesArriba.innerText) + 1;

            // Enviar al Excel de forma invisible
            fetch(`${SCRIPT_URL}?accion=darLike&idFoto=${idFoto}`, { method: 'POST', mode: 'no-cors' });
        }

        async function enviar() {
            const nom = document.getElementById('n').value;
            const msg = document.getElementById('m').value;
            if(!nom || !msg) return alert("Por favor escribe tu nombre y un mensaje");
            
            const btn = document.querySelector('.btn-enviar');
            btn.innerText = "Publicando...";

            const data = new URLSearchParams();
            data.append('Nombre', nom);
            data.append('Mensaje', msg);
            data.append('Color', '#ffffff');

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: data });
            document.getElementById('m').value = "";
            btn.innerText = "PUBLICAR DESEO";
            setTimeout(cargarTodo, 1500);
        }

        function cargarChatSimple(data) {
            // Aquí podrías añadir lógica para mostrar los stickers si decides mandarlos en el JSON
            // Por ahora mantenemos la carga de estadísticas que es lo que pediste
        }

        window.onload = cargarTodo;

        const widget = cloudinary.createUploadWidget({
            cloudName: cloudName, uploadPreset: "ALBUN TEST", tags: [eventTag],
            prepareUploadParams: (cb, params) => {
                const n = prompt("¿Cómo te llamas?") || "Invitado";
                cb({ context: `uploader=${n}` });
            }
        }, (err, res) => { if(res.event === "success") setTimeout(cargarTodo, 2000); });
        document.getElementById("upload_widget").onclick = () => widget.open();

    </script>
</body>
</html>
